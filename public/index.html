<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Share your exhibition experience — leave feedback for the organizers.">
  <title>Exhibition Visitor Log — Leave Feedback</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="page-wrapper">
    <header class="page-header">
      <span class="page-header__eyebrow">Visitor Feedback</span>
      <h1 class="page-header__title">Share Your<br>Experience</h1>
      <p class="page-header__subtitle">We'd love to hear what you thought of the exhibition. Your feedback helps us grow.</p>
    </header>

    <form id="visitor-form" class="card" novalidate>
      <div class="form-group">
        <label class="form-label" for="visitor-name">
          Your Name <span class="form-label__optional">(optional)</span>
        </label>
        <input
          type="text"
          id="visitor-name"
          name="visitor_name"
          class="form-input"
          placeholder="Anonymous"
          maxlength="200"
          autocomplete="name"
        >
      </div>

      <div class="form-group">
        <label class="form-label">
          How would you rate your experience? <span style="color: var(--c-coral);">*</span>
        </label>
        <div class="star-rating" id="star-rating" role="radiogroup" aria-label="Rating">
          <button type="button" class="star-rating__star" data-value="1" aria-label="1 star">
            <svg viewBox="0 0 24 24"><polygon class="star-fill" points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
          <button type="button" class="star-rating__star" data-value="2" aria-label="2 stars">
            <svg viewBox="0 0 24 24"><polygon class="star-fill" points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
          <button type="button" class="star-rating__star" data-value="3" aria-label="3 stars">
            <svg viewBox="0 0 24 24"><polygon class="star-fill" points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
          <button type="button" class="star-rating__star" data-value="4" aria-label="4 stars">
            <svg viewBox="0 0 24 24"><polygon class="star-fill" points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
          <button type="button" class="star-rating__star" data-value="5" aria-label="5 stars">
            <svg viewBox="0 0 24 24"><polygon class="star-fill" points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
        </div>
        <p class="form-error" id="rating-error">Please select a rating before submitting.</p>
      </div>

      <div class="form-group">
        <label class="form-label">
          Which exhibits did you visit? <span class="form-label__optional">(optional)</span>
        </label>
        <div class="checkbox-group" id="exhibits-group">
          <label class="checkbox-item" id="exhibit-robotics">
            <input type="checkbox" name="exhibits" value="Robotics">
            <span class="checkbox-item__indicator">
              <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </span>
            <span class="checkbox-item__label">Robotics</span>
          </label>
          <label class="checkbox-item" id="exhibit-3d-printing">
            <input type="checkbox" name="exhibits" value="3D Printing">
            <span class="checkbox-item__indicator">
              <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </span>
            <span class="checkbox-item__label">3D Printing</span>
          </label>
          <label class="checkbox-item" id="exhibit-ai-demo">
            <input type="checkbox" name="exhibits" value="AI Demo">
            <span class="checkbox-item__indicator">
              <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </span>
            <span class="checkbox-item__label">AI Demo</span>
          </label>
          <label class="checkbox-item" id="exhibit-digital-art">
            <input type="checkbox" name="exhibits" value="Digital Art">
            <span class="checkbox-item__indicator">
              <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </span>
            <span class="checkbox-item__label">Digital Art</span>
          </label>
          <label class="checkbox-item" id="exhibit-vr">
            <input type="checkbox" name="exhibits" value="VR Experience">
            <span class="checkbox-item__indicator">
              <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </span>
            <span class="checkbox-item__label">VR Experience</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="comment">
          Any additional comments? <span class="form-label__optional">(optional)</span>
        </label>
        <textarea
          id="comment"
          name="comment"
          class="form-textarea"
          placeholder="Tell us what stood out, what you loved, or what we could improve…"
          maxlength="2000"
          rows="4"
        ></textarea>
        <div class="char-count" id="char-count">0 / 2,000</div>
      </div>

      <button type="submit" class="btn btn--primary" id="submit-btn">
        <span class="btn__spinner"></span>
        <span class="btn__text">Submit Feedback</span>
      </button>
    </form>
  </main>

  <div class="toast" id="toast"></div>

  <script src="/js/visitor-form.js"></script>
</body>
</html>
