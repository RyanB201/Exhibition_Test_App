<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View individual submission details.">
  <title>Response Detail — Exhibition Visitor Log</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="page-wrapper">
    <nav class="admin-nav">
      <div class="admin-nav__brand">Exhibition <em>Dashboard</em></div>
      <div class="admin-nav__actions">
        <a href="/admin/dashboard" class="btn btn--ghost btn--sm">← Back to Dashboard</a>
        <button class="btn btn--ghost btn--sm" id="logout-btn">Log Out</button>
      </div>
    </nav>

    <div id="response-content">
      <!-- Loaded via JS -->
    </div>

    <div id="not-found" style="display: none;">
      <div class="empty-state">
        <div class="empty-state__icon">?</div>
        <p class="empty-state__text">This response was not found. It may have been deleted.</p>
        <a href="/admin/dashboard" class="btn btn--secondary btn--sm" style="margin-top: 1.5rem;">Back to Dashboard</a>
      </div>
    </div>
  </main>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <h3 class="modal__title">Delete Response?</h3>
      <p class="modal__body">This action is permanent. This submission will be removed from the database and cannot be recovered.</p>
      <div class="modal__actions">
        <button class="btn btn--secondary btn--sm" id="delete-cancel">Cancel</button>
        <button class="btn btn--danger btn--sm" id="delete-confirm">Delete</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/admin-response.js"></script>
</body>
</html>
